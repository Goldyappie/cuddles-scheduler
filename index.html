<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuddle Scheduler</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --midnight-blue: #0b0e14; /* Deep Space */
            --garden-emerald: #6a5acd; /* Slate Blue/Purple */
            --mint-leaf: #b0c4de;    /* Light Steel Blue */
            --sage: #9370db;         /* Medium Purple */
            --moonlight: #ffffff;
            --glass-dark: rgba(255, 255, 255, 0.05);
            --nebula-glow: rgba(147, 112, 219, 0.3);
        }

        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Quicksand', 'Inter', sans-serif; 
            background: var(--midnight-blue); 
            color: var(--moonlight); 
            overflow-x: hidden; 
        }

        .main-wrapper { 
            width: 100vw; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; 
            /* Cosmic Gradient */
            background: radial-gradient(circle at 20% 30%, #161a25 0%, #0b0e14 100%),
                        radial-gradient(circle at 80% 70%, #1a1425 0%, transparent 50%); 
            padding: 80px 20px; overflow: hidden;
        }

        /* Twinkling Stars & Nebula Shapes */
        .shape { 
            position: absolute; opacity: 0.5; pointer-events: none; user-select: none; 
            animation: twinkle 4s ease-in-out infinite alternate; 
        }
        .sparkle-shape::before { content: '⭐'; font-size: 0.8rem; filter: blur(1px); }
        .flower-shape::before { content: '✨'; font-size: 1rem; opacity: 0.8; }
        
        @keyframes twinkle {
            0% { transform: scale(1); opacity: 0.3; filter: brightness(1); }
            100% { transform: scale(1.2); opacity: 0.8; filter: brightness(1.5) drop-shadow(0 0 5px white); }
        }

        .history-trigger {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: var(--glass-dark); border: 1px solid rgba(176, 196, 222, 0.3);
            color: var(--mint-leaf); padding: 10px 18px; border-radius: 25px;
            cursor: pointer; font-size: 0.85rem; font-weight: 700;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .history-trigger:hover { background: var(--garden-emerald); color: white; box-shadow: 0 0 15px var(--nebula-glow); }

        .secret-admin-trigger { position: absolute; top: 0; right: 0; width: 60px; height: 60px; background: transparent; z-index: 3000; }

        .content { 
            z-index: 10; text-align: center; padding: 2.5rem; width: 100%; 
            max-width: 420px; background: rgba(15, 15, 25, 0.7); 
            backdrop-filter: blur(15px); 
            border-radius: 40px; border: 1px solid rgba(176, 196, 222, 0.15); 
            box-shadow: 0 20px 45px rgba(0,0,0,0.6), 0 0 30px var(--nebula-glow); 
        }

        h1 { font-size: 2.2rem; margin: 0; color: var(--mint-leaf); font-weight: 800; text-shadow: 0 0 15px rgba(176, 196, 222, 0.5); }
        .credits { font-size: 0.85rem; color: var(--sage); opacity: 0.8; margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }

        .button-stack { display: flex; flex-direction: column; gap: 12px; }
        .btn-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        button.slot-btn { 
            flex-grow: 1; padding: 16px; border: 1px solid rgba(176, 196, 222, 0.1); 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.03); color: var(--moonlight); font-size: 0.95rem; 
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        button.slot-btn:hover:not(:disabled) { 
            background: rgba(147, 112, 219, 0.15); 
            border-color: var(--mint-leaf); 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button.slot-btn.busy { background: rgba(0,0,0,0.4); color: #444; cursor: not-allowed; border-color: transparent; }
        
        button.clicked { 
            background: linear-gradient(135deg, var(--garden-emerald), var(--sage)) !important; 
            color: white !important;
            border: 1px solid var(--moonlight) !important; 
            box-shadow: 0 0 25px var(--sage) !important; 
            transform: scale(1.02);
        }

        .admin-actions { display: flex; gap: 5px; }
        .act-btn { width: 44px; height: 44px; border-radius: 15px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s; }
        .btn-check { background: #483d8b; color: white; }
        .btn-x { background: #8b0000; color: white; }

        #history-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.97); z-index: 4000; backdrop-filter: blur(15px);
            padding: 60px 20px; overflow-y: auto;
        }
        .history-card {
            background: rgba(255, 255, 255, 0.03); padding: 18px; border-radius: 20px;
            border-left: 4px solid var(--sage); margin-bottom: 15px;
            text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #message { margin-top: 25px; font-size: 1rem; min-height: 25px; font-weight: 700; color: var(--mint-leaf); text-shadow: 0 0 8px var(--nebula-glow); }
        #admin-badge { display: none; background: var(--garden-emerald); color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; margin-bottom: 15px; font-weight: 800; box-shadow: 0 0 10px var(--sage); }
        
        .reset-link { 
            margin-top: 20px; padding: 14px 24px; border-radius: 25px; 
            border: 1px solid var(--sage); background: transparent; 
            color: var(--mint-leaf); font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;
        }
        .reset-link:hover { background: var(--garden-emerald); color: white; border-color: transparent; }

        #back-to-user { display: none; margin-top: 15px; background: transparent; border: 1px solid var(--moonlight); color: var(--moonlight); padding: 8px 15px; border-radius: 15px; cursor: pointer; font-weight: 700; opacity: 0.7; }
        #back-to-user:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="history-overlay">
    <div style="max-width: 400px; margin: 0 auto; position: relative;">
        <button onclick="closeHistory()" style="position: absolute; right: 0; top: -40px; background: none; border: none; color: var(--mint-leaf); font-size: 2.5rem; cursor: pointer;">&times;</button>
        <h2 style="margin-bottom: 30px; text-align: center; color: var(--mint-leaf);">Cuddle History 🧸</h2>
        <div id="history-list"></div>
    </div>
</div>

<div class="secret-admin-trigger" onmousedown="startHold()" onmouseup="endHold()" ontouchstart="startHold()" ontouchend="endHold()"></div>

<div class="main-wrapper" id="shape-container">
    <button class="history-trigger" onclick="showHistory()">📜 Cuddle History</button>

    <div class="content">
        <div id="admin-badge">ADMIN MODE ✨</div>
        <h1>When cuddles?</h1>
        <div class="credits">Website by Milly</div>
        
        <div class="button-stack" id="btn-stack"></div>

        <div id="message"></div>
        
        <button onclick="resetSelection()" class="reset-link">Clear Choice</button>
        <button id="back-to-user" onclick="exitAdminMode()">Exit Admin</button>
    </div>
</div>

<script>
/* LOGIC REMAINS COMPLETELY UNCHANGED */
const supabaseUrl = 'https://tsgldacamcflsezmlzgb.supabase.co'; 
const supabaseKey = 'sb_publishable_-qmbAAYM5g3CO335chWO_Q_EMXPC2w2'; 
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
const webhookURL = "https://discord.com/api/webhooks/1475479375276281968/-vJyQSHF25rO01nnz3lv5wWD6nW_ikfRftXz39KTBIZ54dFi2RZ8CXP3UrvgznLQGwnD";

let isAdmin = false;
let holdTimer;
let busyDays = [];

function startHold() { holdTimer = setTimeout(adminLogin, 3000); }
function endHold() { clearTimeout(holdTimer); }
function adminLogin() {
    if (isAdmin) return;
    const pass = prompt("Secret Key:");
    if (pass === "ex18gagd") { 
        isAdmin = true;
        document.getElementById('admin-badge').style.display = 'inline-block';
        document.getElementById('back-to-user').style.display = 'inline-block';
        render();
    }
}
function exitAdminMode() {
    isAdmin = false;
    document.getElementById('admin-badge').style.display = 'none';
    document.getElementById('back-to-user').style.display = 'none';
    render();
}

async function showHistory() {
    const overlay = document.getElementById('history-overlay');
    const list = document.getElementById('history-list');
    overlay.style.display = 'block';
    list.innerHTML = '<p style="text-align:center; opacity:0.5;">Looking for memories...</p>';

    const { data, error } = await _supabase.from('cuddle_history').select('day_text');

    if (error || !data || data.length === 0) {
        list.innerHTML = '<p style="text-align:center; opacity:0.5;">No history found yet!</p>';
        return;
    }

    list.innerHTML = data.map(item => `
        <div class="history-card">
            <div style="font-weight: 700; color: var(--mint-leaf); font-size: 1.1rem;">${item.day_text}</div>
            <div style="font-size: 0.8rem; color: var(--sage); margin-top: 4px; font-weight: 700;">✨ Scheduled!</div>
        </div>
    `).join('');
}

function closeHistory() { document.getElementById('history-overlay').style.display = 'none'; }

function getCurrentWeek() {
    const today = new Date();
    const sunday = new Date(today);
    sunday.setDate(today.getDate() - today.getDay());
    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    
    return Array.from({length: 7}, (_, i) => {
        let d = new Date(sunday);
        d.setDate(sunday.getDate() + i);
        return {
            id: `d-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`, 
            text: `${days[i]}, ${months[d.getMonth()]} ${d.getDate()}`
        };
    });
}

async function render() {
    const { data: bData } = await _supabase.from('busy_days').select('day_id');
    busyDays = bData ? bData.map(d => d.day_id) : [];

    const { data: sData } = await _supabase.from('current_selection').select('day_id');
    const globalSelectedId = sData && sData.length ? sData[0].day_id : null;

    const stack = document.getElementById('btn-stack');
    stack.innerHTML = '';
    
    getCurrentWeek().forEach(day => {
        const row = document.createElement('div');
        row.className = 'btn-row';

        const btn = document.createElement('button');
        btn.className = 'slot-btn';
        btn.innerHTML = `${day.text} <span style="font-size:0.7rem; opacity:0.3">Night</span>`;

        if (busyDays.includes(day.id)) btn.classList.add('busy');
        if (globalSelectedId === day.id) btn.classList.add('clicked');
        if (globalSelectedId && globalSelectedId !== day.id) btn.disabled = true;

        btn.onclick = async () => {
            if (isAdmin) {
                if (busyDays.includes(day.id)) {
                    await _supabase.from('busy_days').delete().eq('day_id', day.id);
                } else {
                    await _supabase.from('busy_days').insert([{day_id: day.id}]);
                }
                render();
            } else if (!globalSelectedId) {
                userPick(day, btn);
            }
        };

        row.appendChild(btn);

        if (isAdmin && globalSelectedId === day.id) {
            const actions = document.createElement('div');
            actions.className = 'admin-actions';
            actions.innerHTML = `
                <button class="act-btn btn-check" onclick="adminConfirm('${day.text}', this)">✓</button>
                <button class="act-btn btn-x" onclick="adminCancel(this)">✕</button>
            `;
            row.appendChild(actions);
        }
        stack.appendChild(row);
    });
}

async function userPick(day, btn) {
    const messageEl = document.getElementById('message');
    if (busyDays.includes(day.id)) {
        messageEl.innerText = "🌸 Sorry, Milly is unavailable that night!";
    } else {
        messageEl.innerText = "🎀 Yay! Milly is available!";
        btn.classList.add('clicked');
        await _supabase.from('current_selection').delete().neq('day_id','NONE');
        await _supabase.from('current_selection').insert([{ day_id: day.id }]);
        fetch(webhookURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: `🌸 Cuddle scheduled for: **${day.text} (Nighttime)**` }) });
        render();
    }
}

async function adminConfirm(text) {
    await _supabase.from('cuddle_history').insert([{ day_text: text }]);
    await _supabase.from('current_selection').delete().neq('day_id','NONE');
    fetch(webhookURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: `✅ **Confirmed for:** ${text}!` }) });
    render();
}

async function adminCancel() {
    await _supabase.from('current_selection').delete().neq('day_id','NONE');
    render();
}

async function resetSelection() {
    await _supabase.from('current_selection').delete().neq('day_id','NONE');
    document.getElementById('message').innerText = '';
    render();
}

const shapeCont = document.getElementById('shape-container');
for(let i=0; i<40; i++) {
    const s = document.createElement('div');
    s.className = `shape ${Math.random() > 0.5 ? 'sparkle-shape' : 'flower-shape'}`;
    s.style.top = Math.random() * 100 + '%';
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 5 + 's';
    s.style.fontSize = (0.5 + Math.random() * 0.5) + 'rem';
    shapeCont.appendChild(s);
}

render();
</script>
</body>
</html>
