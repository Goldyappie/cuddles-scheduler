<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuddle_Protocol_v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d0221;
            --neon-cyan: #00d4ff;
            --neon-purple: #bc6ff1;
            --cyber-blue: #5465ff;
            --text-main: #e2e2e2;
            --glass: rgba(188, 111, 241, 0.05);
            --scanline: rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; cursor: crosshair; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(var(--scanline) 50%, transparent 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 100; opacity: 0.3;
        }

        .main-wrapper { 
            width: 100vw; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; 
            background: radial-gradient(circle at center, #240b36 0%, #0d0221 100%); 
            padding: 40px 20px;
        }

        /* Floating Digital Bits */
        .shape { 
            position: absolute; opacity: 0.4; pointer-events: none; 
            color: var(--neon-cyan); font-family: monospace; font-size: 0.8rem;
            animation: float 10s linear infinite; 
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .history-trigger {
            position: absolute; top: 20px; left: 20px; z-index: 110;
            background: transparent; border: 1px solid var(--neon-purple);
            color: var(--neon-purple); padding: 8px 16px; border-radius: 4px;
            cursor: pointer; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        .history-trigger:hover { background: var(--neon-purple); color: var(--bg-dark); box-shadow: 0 0 15px var(--neon-purple); }

        .secret-admin-trigger { position: absolute; top: 0; right: 0; width: 50px; height: 50px; background: transparent; z-index: 3000; }

        .content { 
            z-index: 10; text-align: center; padding: 2.5rem; width: 100%; 
            max-width: 400px; background: rgba(13, 2, 33, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--cyber-blue);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.1);
        }

        h1 { 
            font-size: 1.8rem; margin: 0; color: var(--neon-cyan); 
            font-weight: 700; text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .credits { font-size: 0.65rem; color: var(--neon-purple); opacity: 0.8; margin-bottom: 30px; letter-spacing: 3px; text-transform: uppercase; }

        .button-stack { display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 8px; width: 100%; }
        
        button.slot-btn { 
            flex-grow: 1; padding: 14px; border: 1px solid rgba(84, 101, 255, 0.3); 
            background: rgba(84, 101, 255, 0.05); color: var(--text-main); 
            font-size: 0.85rem; font-weight: 500; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.2s;
        }
        button.slot-btn:hover:not(:disabled) { 
            background: rgba(0, 212, 255, 0.1); border-color: var(--neon-cyan); 
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        button.slot-btn.busy { background: #1a1a1a; color: #444; border-color: transparent; cursor: not-allowed; }
        
        button.clicked { 
            background: var(--neon-purple) !important; color: white !important;
            border: none !important; box-shadow: 0 0 20px var(--neon-purple) !important; 
        }

        .act-btn { width: 40px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-check { background: #00ff88; }
        .btn-x { background: #ff3366; }

        #history-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 2, 33, 0.98); z-index: 4000; padding: 60px 20px; overflow-y: auto;
        }
        .history-card {
            background: rgba(188, 111, 241, 0.05); padding: 15px; border-radius: 2px;
            border-left: 2px solid var(--neon-cyan); margin-bottom: 10px; text-align: left;
        }

        #message { margin-top: 20px; font-size: 0.8rem; color: var(--neon-cyan); min-height: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #admin-badge { display: none; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 4px 10px; font-size: 0.6rem; margin-bottom: 10px; box-shadow: 0 0 10px var(--neon-cyan); }
        
        .reset-link { 
            margin-top: 20px; background: transparent; border: 1px solid #444; 
            color: #888; padding: 10px; width: 100%; font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .reset-link:hover { border-color: var(--text-main); color: var(--text-main); }
        
        #back-to-user { display: none; margin-top: 10px; background: transparent; border: 1px solid red; color: red; padding: 5px; width: 100%; font-size: 0.6rem; }
    </style>
</head>
<body>

<div id="history-overlay">
    <div style="max-width: 400px; margin: 0 auto; position: relative;">
        <button onclick="closeHistory()" style="position: absolute; right: 0; top: -40px; background: none; border: none; color: var(--neon-cyan); font-size: 2rem; cursor: pointer;">&times;</button>
        <h2 style="letter-spacing: 5px; color: var(--neon-cyan); text-align: center;">LOG_HISTORY</h2>
        <div id="history-list"></div>
    </div>
</div>

<div class="secret-admin-trigger" onmousedown="startHold()" onmouseup="endHold()"></div>

<div class="main-wrapper" id="particle-container">
    <button class="history-trigger" onclick="showHistory()">[ MEMORY_LOG ]</button>

    <div class="content">
        <div id="admin-badge">ROOT_ACCESS_GRANTED</div>
        <h1>SCHEDULE_v2</h1>
        <div class="credits">User: Milly // Protocol: Cuddle</div>
        
        <div class="button-stack" id="btn-stack"></div>

        <div id="message"></div>
        
        <button onclick="resetSelection()" class="reset-link">Clear Selection</button>
        <button id="back-to-user" onclick="exitAdminMode()">Exit Root</button>
    </div>
</div>

<script>
const supabaseUrl = 'https://tsgldacamcflsezmlzgb.supabase.co'; 
const supabaseKey = 'sb_publishable_-qmbAAYM5g3CO335chWO_Q_EMXPC2w2'; 
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
const webhookURL = "https://discord.com/api/webhooks/1475479375276281968/-vJyQSHF25rO01nnz3lv5wWD6nW_ikfRftXz39KTBIZ54dFi2RZ8CXP3UrvgznLQGwnD";

let isAdmin = false;
let holdTimer;
let busyDays = [];

function startHold() { holdTimer = setTimeout(adminLogin, 3000); }
function endHold() { clearTimeout(holdTimer); }
function adminLogin() {
    if (isAdmin) return;
    const pass = prompt("Enter Access Key:");
    if (pass === "ex18gagd") { 
        isAdmin = true;
        document.getElementById('admin-badge').style.display = 'inline-block';
        document.getElementById('back-to-user').style.display = 'block';
        render();
    }
}
function exitAdminMode() {
    isAdmin = false;
    document.getElementById('admin-badge').style.display = 'none';
    document.getElementById('back-to-user').style.display = 'none';
    render();
}

async function showHistory() {
    const overlay = document.getElementById('history-overlay');
    const list = document.getElementById('history-list');
    overlay.style.display = 'block';
    list.innerHTML = '<p style="text-align:center; opacity:0.5; font-size:0.7rem;">ACCESSING DATABASE...</p>';

    const { data, error } = await _supabase.from('cuddle_history').select('day_text');

    if (error || !data || data.length === 0) {
        list.innerHTML = '<p style="text-align:center; opacity:0.5; font-size:0.7rem;">NO LOGS FOUND.</p>';
        return;
    }

    list.innerHTML = data.map(item => `
        <div class="history-card">
            <div style="font-weight: 700; color: var(--neon-cyan); font-size: 0.9rem;">${item.day_text}</div>
            <div style="font-size: 0.6rem; color: var(--neon-purple); margin-top: 4px;">PROTOCOL_SUCCESSFUL</div>
        </div>
    `).join('');
}

function closeHistory() { document.getElementById('history-overlay').style.display = 'none'; }

function getCurrentWeek() {
    const today = new Date();
    const sunday = new Date(today);
    sunday.setDate(today.getDate() - today.getDay());
    const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    
    return Array.from({length: 7}, (_, i) => {
        let d = new Date(sunday);
        d.setDate(sunday.getDate() + i);
        return {
            id: `d-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`, 
            text: `${days[i]} / ${d.getDate()}.${d.getMonth()+1}`
        };
    });
}

async function render() {
    const { data: bData } = await _supabase.from('busy_days').select('day_id');
    busyDays = bData ? bData.map(d => d.day_id) : [];

    const { data: sData } = await _supabase.from('current_selection').select('day_id');
    const globalSelectedId = sData && sData.length ? sData[0].day_id : null;

    const stack = document.getElementById('btn-stack');
    stack.innerHTML = '';
    
    getCurrentWeek().forEach(day => {
        const row = document.createElement('div');
        row.className = 'btn-row';

        const btn = document.createElement('button');
        btn.className = 'slot-btn';
        btn.innerHTML = `<span>${day.text}</span> <small style="font-size:0.6rem; opacity:0.5; margin-left:10px;">[NIGHT]</small>`;

        if (busyDays.includes(day.id)) btn.classList.add('busy');
        if (globalSelectedId === day.id) btn.classList.add('clicked');
        if (globalSelectedId && globalSelectedId !== day.id) btn.disabled = true;

        btn.onclick = async () => {
            if (isAdmin) {
                if (busyDays.includes(day.id)) {
                    await _supabase.from('busy_days').delete().eq('day_id', day.id);
                } else {
                    await _supabase.from('busy_days').insert([{day_id: day.id}]);
                }
                render();
            } else if (!globalSelectedId) {
                userPick(day, btn);
            }
        };

        row.appendChild(btn);

        if (isAdmin && globalSelectedId === day.id) {
            const actions = document.createElement('div');
            actions.style.display = 'flex';
            actions.innerHTML = `
                <button class="act-btn btn-check" onclick="adminConfirm('${day.text}')">OK</button>
                <button class="act-btn btn-x" onclick="adminCancel()">NO</button>
            `;
            row.appendChild(actions);
        }
        stack.appendChild(row);
    });
}

async function userPick(day, btn) {
    const messageEl = document.getElementById('message');
    if (busyDays.includes(day.id)) {
        messageEl.innerText = "> ERROR: MILLY_UNAVAILABLE";
    } else {
        messageEl.innerText = "> UPLINK_SUCCESSFUL: DATE_SELECTED";
        btn.classList.add('clicked');
        await _supabase.from('current_selection').delete().neq('day_id','NONE');
        await _supabase.from('current_selection').insert([{ day_id: day.id }]);
        fetch(webhookURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: `👾 **SYSTEM UPLINK:** Cuddle confirmed for **${day.text}**` }) });
        render();
    }
}

async function adminConfirm(text) {
    await _supabase.from('cuddle_history').insert([{ day_text: text }]);
    await _supabase.from('current_selection').delete().neq('day_id','NONE');
    fetch(webhookURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: `✅ **DATABASE UPDATED:** ${text} confirmed.` }) });
    render();
}

async function adminCancel() {
    await _supabase.from('current_selection').delete().neq('day_id','NONE');
    render();
}

async function resetSelection() {
    await _supabase.from('current_selection').delete().neq('day_id','NONE');
    document.getElementById('message').innerText = '> SYSTEM_RESET';
    render();
}

// Particle Generator
const partCont = document.getElementById('particle-container');
const particles = ['0', '1', '{ }', '< >', '++', '--', '##'];
for(let i=0; i<30; i++) {
    const s = document.createElement('div');
    s.className = 'shape';
    s.innerText = particles[Math.floor(Math.random() * particles.length)];
    s.style.top = Math.random() * 100 + '%';
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 8 + 's';
    partCont.appendChild(s);
}

render();
</script>
</body>
</html>
